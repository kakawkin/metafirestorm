        <h1>⚔ Калькулятор талантов WoW</h1>
        <div id="root"><div id="loading">Загрузка талантов…</div></div>

        <script>
            window.showFatal = function (message) {
                const loadingEl = document.getElementById("loading");
                if (loadingEl) {
                    loadingEl.textContent = message;
                    loadingEl.style.color = "#ff8080";
                }
            };
        </script>

        <!-- React + Babel from CDN (dev build for demo) -->
        <script
            crossorigin
            src="https://unpkg.com/react@18/umd/react.development.js"
            onerror="showFatal('Не удалось загрузить react.development.js')"
        ></script>
        <script
            crossorigin
            src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
            onerror="showFatal('Не удалось загрузить react-dom.development.js')"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone/babel.min.js"
            onerror="showFatal('Не удалось загрузить babel.min.js')"
        ></script>

        <script>
            // Load the talent JSON, then mount the React component
            fetch("./talents.json")
                .then((r) => {
                    if (!r.ok) {
                        throw new Error(
                            `HTTP ${r.status} при загрузке talents.json`,
                        );
                    }
                    return r.json();
                })
                .then((data) => {
                    window.__TALENTS_DATA__ = data;
                    document.dispatchEvent(new Event("talentsLoaded"));
                })
                .catch((err) => {
                    showFatal(`Не удалось загрузить talents.json: ${err.message}`);
                });
        </script>

            const RU_SUBTREE_NAMES = {"Aldrachi Reaver":"Альдрахийский разоритель","Archon":"Архонт","Chronowarden":"Хроностраж","Colossus":"Колосс","Conduit of the Celestials":"Проводник Небожителей","Dark Ranger":"Темный следопыт","Deathbringer":"Вестник Смерти","Deathstalker":"Ловчий смерти","Diabolist":"Демонопоклонник","Druid of the Claw":"Друид-хищник","Elune's Chosen":"Избранник Элуны","Farseer":"Предсказатель","Fatebound":"Служитель судьбы","Fel-Scarred":"Истерзанный Скверной","Flameshaper":"Ваятель огня","Frostfire":"Ледяной огонь","Hellcaller":"Призыватель огня","Herald of the Sun":"Вестник солнца","Keeper of the Grove":"Хранитель рощи","Lightsmith":"Кузнец Света","Master of Harmony":"Мастер гармонии","Mountain Thane":"Горный тан","Oracle":"Оракул","Pack Leader":"Вожак стаи","Rider of the Apocalypse":"Всадник апокалипсиса","San'layn":"Сан'лейн","Scalecommander":"Дракомандир","Sentinel":"Часовой","Shado-Pan":"Шадо-Пан","Slayer":"Истребитель","Soul Harvester":"Пожинатель душ","Spellslinger":"Чаромет","Stormbringer":"Вестник шторма","Sunfury":"Ярость солнца","Templar":"Храмовник","Totemic":"Тотемист","Trickster":"Ловкач","Voidweaver":"Ткач Бездны","Wildstalker":"Следопыт"};

            function classNameRu(classId, fallback = "") {
                return CLASS_NAMES[classId] || fallback;
            }
            function specNameRu(specId, fallback = "") {
                return SPEC_NAMES[specId] || fallback;
            }
            function entryNameRu(entry) {
                if (!entry) return "";
                return RU_SPELL_NAMES[entry.spellId] || entry.name || "";
            }
            function localizedEntry(entry) {
                if (!entry) return entry;
                const name = entryNameRu(entry);
                return name && name !== entry.name ? { ...entry, name } : entry;
            }
            function subTreeNameRu(entryOrName, fallback = "Герой") {
                const name = typeof entryOrName === "string" ? entryOrName : entryOrName?.name;
                return RU_SUBTREE_NAMES[name] || name || fallback;
            }

            /* ── Helpers ── */
            function iconUrl(icon) {
                if (!icon) return `${ICON_BASE}inv_misc_questionmark.jpg`;
                return `${ICON_BASE}${icon.replace(/\.(tga|blp)$/i, "")}.jpg`;
            }
            function coordToPx(posX, posY, minX, minY) {
                return {
                    x: Math.round(((posX - minX) / GRID_STEP) * GRID_PX),
                    y: Math.round(((posY - minY) / GRID_STEP) * GRID_PX),
                };
            }
            function buildNodeMap(nodes) {
                const m = {};
                for (const n of nodes) m[n.id] = n;
                return m;
            }
            function totalSpent(build) {
                return Object.values(build).reduce((s, v) => s + v, 0);
            }
            function getNodeRank(node, build) {
                const rank = build[node.id] || 0;
                if (rank > 0) return rank;
                return node.freeNode ? node.maxRanks || 1 : 0;
            }
            function getNodeChoice(node, build) {
                return (
                    build[`${node.id}_choice`] ||
                    node.entries?.[0]?.index ||
                    100
                );
            }
            function isNodeAvailable(node, build, nodeMap) {
                if (node.entryNode || node.freeNode) return true;
                if (!node.prev || node.prev.length === 0) return true;
                return node.prev.some((pid) => {
                    const prevNode = nodeMap?.[pid] || { id: pid, maxRanks: 1 };
                    return getNodeRank(prevNode, build) > 0;
                });
            }
            function canRemovePoint(nodeId, build, nodeMap) {
                const h = { ...build, [nodeId]: (build[nodeId] || 0) - 1 };
                if (h[nodeId] <= 0) delete h[nodeId];
                for (const [id, rank] of Object.entries(h)) {
                    if (rank <= 0) continue;
                    const n = nodeMap[id];
                    if (!n || n.entryNode || n.freeNode || !n.prev?.length)
                        continue;
                    if (
                        !n.prev.some((pid) => getNodeRank(nodeMap[pid] || { id: pid, maxRanks: 1 }, h) > 0)
                    )
                        return false;
                }
                return true;
            }

            /* ── SVG Connectors ── */
            function TalentConnectors({ nodes, build, nodeMap, minX, minY }) {
                const half = CELL_PX / 2;
                const ARROW_SIZE = 5; // длина наконечника в px
                const ARROW_W = 2.5; // полуширина наконечника

                const segments = useMemo(() => {
                    const result = [],
                        seen = new Set();
                    for (const node of nodes) {
                        for (const nextId of node.next || []) {
                            const key = `${node.id}-${nextId}`;
                            if (seen.has(key)) continue;
                            seen.add(key);
                            const target = nodeMap[nextId];
                            if (!target) continue;

                            const from = coordToPx(
                                node.posX,
                                node.posY,
                                minX,
                                minY,
                            );
                            const to = coordToPx(
                                target.posX,
                                target.posY,
                                minX,
                                minY,
                            );

                            const fx = from.x + half,
                                fy = from.y + half;
                            const tx = to.x + half,
                                ty = to.y + half;
                            const dx = tx - fx,
                                dy = ty - fy;
                            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                            const ux = dx / dist,
                                uy = dy / dist; // единичный вектор
                            const nx = -uy,
                                ny = ux; // нормаль (перпендикуляр)

                            // линия: от края иконки-источника до основания наконечника
                            const x1 = fx + ux * (half + 2);
                            const y1 = fy + uy * (half + 2);
                            const x2 = tx - ux * (half + ARROW_SIZE + 1);
                            const y2 = ty - uy * (half + ARROW_SIZE + 1);

                            // наконечник: острие + два угла основания
                            const tipX = tx - ux * (half - 1);
                            const tipY = ty - uy * (half - 1);
                            const baseX = tipX - ux * ARROW_SIZE;
                            const baseY = tipY - uy * ARROW_SIZE;
                            const pts = [
                                `${tipX},${tipY}`,
                                `${baseX + nx * ARROW_W},${baseY + ny * ARROW_W}`,
                                `${baseX - nx * ARROW_W},${baseY - ny * ARROW_W}`,
                            ].join(" ");

                            const fromA = getNodeRank(node, build) > 0;
                            const toA = getNodeRank(target, build) > 0;
                            const color = fromA && toA ? "#c9b27a" : "#3a3529";
                            const sw = fromA && toA ? 1.25 : 1;

                            result.push({
                                key,
                                x1,
                                y1,
                                x2,
                                y2,
                                pts,
                                color,
                                sw,
                            });
                        }
                    }
                    return result;
                }, [nodes, build, nodeMap, minX, minY]);

                if (!segments.length) return null;

                return (
                    <svg
                        style={{
                            position: "absolute",
                            top: 0,
                            left: 0,
                            width: "100%",
                            height: "100%",
                            pointerEvents: "none",
                            overflow: "visible",
                        }}
                    >
                        {segments.map(
                            ({ key, x1, y1, x2, y2, pts, color, sw }) => (
                                <g key={key}>
                                    <line
                                        x1={x1}
                                        y1={y1}
                                        x2={x2}
                                        y2={y2}
                                        stroke={color}
                                        strokeWidth={sw}
                                        strokeLinecap="round"
                                    />
                                    <polygon points={pts} fill={color} />
                                </g>
                            ),
                        )}
                    </svg>
                );
            }

            /* ── Tooltip ── */
            function Tooltip({ entry, node, rank, classColor, x, y }) {
                const maxRank = node.maxRanks || 1;
                const safeX = Math.min(x, window.innerWidth - 250);
                const safeY = Math.max(8, y);
                return (
                    <div
                        style={{
                            position: "fixed",
                            left: safeX,
                            top: safeY,
                            zIndex: 9999,
                            width: 230,
                            background:
                                "linear-gradient(135deg,#18100a,#0c0806)",
                            border: `1px solid ${classColor}55`,
                            borderRadius: 6,
                            padding: "10px 12px",
                            pointerEvents: "none",
                            boxShadow: "0 8px 32px rgba(0,0,0,0.85)",
                            fontFamily: '"Exo 2",sans-serif',
                        }}
                    >
                        <div
                            style={{
                                display: "flex",
                                gap: 8,
                                marginBottom: 6,
                                alignItems: "center",
                            }}
                        >
                            <img
                                src={iconUrl(entry.icon)}
                                style={{
                                    width: 34,
                                    height: 34,
                                    borderRadius: 3,
                                    border: `1px solid ${classColor}66`,
                                }}
                                alt=""
                                onError={(e) =>
                                    (e.target.src = `${ICON_BASE}inv_misc_questionmark.jpg`)
                                }
                            />
                            <div>
                                <div
                                    style={{
                                        color: classColor,
                                        fontSize: 13,
                                        fontWeight: 700,
                                    }}
                                >
                                    {entry.name}
                                </div>
                                <div
                                    style={{
                                        color: "#777",
                                        fontSize: 10,
                                        marginTop: 2,
                                    }}
                                >
                                    {entry.type === "active"
                                        ? "⚡ Активный"
                                        : "✦ Пассивный"}
                                    {maxRank > 1 &&
                                        ` — Ранг ${rank}/${maxRank}`}
                                </div>
                            </div>
                        </div>
                        {node.type === "choice" && (
                            <div
                                style={{
                                    color: "#666",
                                    fontSize: 10,
                                    paddingTop: 4,
                                    borderTop: "1px solid #222",
                                    marginBottom: 4,
                                }}
                            >
                                Узел выбора — нажмите, чтобы сменить вариант
                            </div>
                        )}
                        <div
                            style={{
                                color: "#aaa",
                                fontSize: 11,
                                lineHeight: 1.4,
                            }}
                        >
                            {rank === 0
                                ? "Нажмите, чтобы изучить."
                                : rank < maxRank
                                  ? "Нажмите, чтобы повысить ранг. Правый клик — убрать."
                                  : "Правый клик — убрать."}
                        </div>
                    </div>
                );
            }

            /* ── Single Node ── */
            function TalentNode({
                node,
                build,
                nodeMap,
                onLeft,
                onRight,
                classColor,
            }) {
                const [hov, setHov] = useState(false);
                const [tipPos, setTipPos] = useState({ x: 0, y: 0 });
                const ref = useRef();
                const rank = getNodeRank(node, build);
                const maxRank = node.maxRanks || 1;
                const isFull = rank >= maxRank;
                const isEmpty = rank === 0;
                const avail = isNodeAvailable(node, build, nodeMap);
                const isChoice = node.type === "choice";
                const choiceIdx = getNodeChoice(node, build);
                const displayEntry = localizedEntry(
                    isChoice && rank > 0
                        ? (node.entries || []).find(
                              (e) => e.index === choiceIdx,
                          ) || node.entries?.[0]
                        : node.entries?.[0],
                );

                function enter(e) {
                    setHov(true);
                    const r = ref.current?.getBoundingClientRect();
                    if (r) setTipPos({ x: r.right + 8, y: r.top });
                }

                const borderColor = isFull
                    ? "#dec57f"
                    : rank > 0
                      ? "#84ad57"
                      : avail
                        ? "#84ad57"
                        : "#3b3429";

                // Форма иконки как у Wowhead:
                // passive → круглая, choice → сильно скруглённая, active → квадратная
                const isPassive = displayEntry?.type === "passive";
                const iconRadius = isChoice ? "20%" : isPassive ? "50%" : "3px";

                return (
                    <div
                        ref={ref}
                        style={{
                            position: "absolute",
                            width: CELL_PX,
                            height: CELL_PX,
                        }}
                        onMouseEnter={enter}
                        onMouseLeave={() => setHov(false)}
                    >
                        {isChoice && (
                            <div
                                style={{
                                    position: "absolute",
                                    top: -8,
                                    left: "50%",
                                    transform: "translateX(-50%)",
                                    fontSize: 9,
                                    color: "#c8a84b",
                                    pointerEvents: "none",
                                    zIndex: 2,
                                    textShadow: "0 0 4px #000",
                                }}
                            >
                                ⬡
                            </div>
                        )}
                        <button
                            onClick={() => onLeft(node)}
                            onContextMenu={(e) => {
                                e.preventDefault();
                                onRight(node);
                            }}
                            style={{
                                width: "100%",
                                height: "100%",
                                padding: 0,
                                border: `2px solid ${borderColor}`,
                                borderRadius: iconRadius,
                                background: "#0a0a0a",
                                cursor:
                                    node.freeNode
                                        ? "default"
                                        : avail || !isEmpty
                                        ? "pointer"
                                        : "not-allowed",
                                position: "relative",
                                overflow: "hidden",
                                outline: "none",
                                transition:
                                    "border-color 0.15s, transform 0.1s, box-shadow 0.15s",
                                transform:
                                    hov && !node.freeNode && (avail || !isEmpty)
                                        ? "scale(1.15)"
                                        : "scale(1)",
                                boxShadow: "none",
                            }}
                        >
                            {displayEntry && (
                                <img
                                    src={iconUrl(displayEntry.icon)}
                                    alt={displayEntry.name}
                                    style={{
                                        width: "100%",
                                        height: "100%",
                                        display: "block",
                                        borderRadius: iconRadius,
                                        filter:
                                            isEmpty && !avail
                                                ? "grayscale(100%) brightness(0.34)"
                                                : hov && !node.freeNode && avail
                                                  ? "brightness(1.18)"
                                                  : isEmpty
                                                    ? "brightness(1)"
                                                    : "brightness(1) saturate(1)",
                                        transition: "filter 0.2s",
                                    }}
                                    onError={(e) =>
                                        (e.target.src = `${ICON_BASE}inv_misc_questionmark.jpg`)
                                    }
                                />
                            )}
                        </button>
                        {maxRank > 1 && (
                            <div
                                style={{
                                    position: "absolute",
                                    right: -2,
                                    bottom: -2,
                                    fontSize: 9,
                                    fontWeight: 700,
                                    color: "#fff",
                                    background: "#000",
                                    borderRadius: 2,
                                    padding: "0 3px",
                                    fontFamily: '"Exo 2",sans-serif',
                                    whiteSpace: "nowrap",
                                    textShadow:
                                        "1px 1px 0 #242424,0 1px 0 #242424,-1px 1px 0 #242424,-1px 0 0 #242424,-1px -1px 0 #242424,0 -1px 0 #242424,1px -1px 0 #242424,1px 0 0 #242424",
                                    pointerEvents: "none",
                                    zIndex: 2,
                                    lineHeight: 1,
                                }}
                            >
                                {rank}/{maxRank}
                            </div>
                        )}
                        {hov && displayEntry && (
                            <Tooltip
                                entry={displayEntry}
                                node={node}
                                rank={rank}
                                classColor={classColor || "#c8a84b"}
                                x={tipPos.x}
                                y={tipPos.y}
                            />
                        )}
                    </div>
                );
            }

            /* ── Tree ── */
            function TalentTree({
                title,
                icon,
                nodes,
                build,
                onUpdate,
                nodeMap,
                classColor,
                label,
            }) {
                if (!nodes || !nodes.length) return null;
                const { minX, minY, maxX, maxY } = useMemo(() => {
                    let mnX = Infinity,
                        mnY = Infinity,
                        mxX = -Infinity,
                        mxY = -Infinity;
                    for (const n of nodes) {
                        if (n.posX < mnX) mnX = n.posX;
                        if (n.posY < mnY) mnY = n.posY;
                        if (n.posX > mxX) mxX = n.posX;
                        if (n.posY > mxY) mxY = n.posY;
                    }
                    return { minX: mnX, minY: mnY, maxX: mxX, maxY: mxY };
                }, [nodes]);

                const cols = Math.round((maxX - minX) / GRID_STEP) + 1;
                const rows = Math.round((maxY - minY) / GRID_STEP) + 1;
                // canvas покрывает все ноды: шаг * (cols-1) + размер иконки + небольшой отступ
                const canvasW = (cols - 1) * GRID_PX + CELL_PX + 8;
                const canvasH = (rows - 1) * GRID_PX + CELL_PX + 8;

                const spent = useMemo(
                    () => nodes.reduce((s, n) => s + (build[n.id] || 0), 0),
                    [nodes, build],
                );

                // Gate levels present in this tree
                const gates = [
                    ...new Set(
                        nodes
                            .filter((n) => n.reqPoints > 0)
                            .map((n) => n.reqPoints),
                    ),
                ].sort((a, b) => a - b);

                function handleLeft(node) {
                    if (node.freeNode) return;
                    if (node.reqPoints && spent < node.reqPoints) return;
                    if (!isNodeAvailable(node, build, nodeMap) && !getNodeRank(node, build))
                        return;
                    const rank = build[node.id] || 0;
                    if (node.type === "choice") {
                        const entries = node.entries || [];
                        if (rank === 0) {
                            onUpdate({
                                ...build,
                                [node.id]: 1,
                                [`${node.id}_choice`]: entries[0]?.index || 100,
                            });
                            return;
                        }
                        const ci = entries.findIndex(
                            (e) =>
                                e.index ===
                                (build[`${node.id}_choice`] ||
                                    entries[0]?.index),
                        );
                        const ni = (ci + 1) % entries.length;
                        onUpdate({
                            ...build,
                            [`${node.id}_choice`]: entries[ni].index,
                        });
                        return;
                    }
                    if (rank >= node.maxRanks) return;
                    onUpdate({ ...build, [node.id]: rank + 1 });
                }
                function handleRight(node) {
                    if (node.freeNode) return;
                    const rank = build[node.id] || 0;
                    if (!rank) return;
                    if (!canRemovePoint(node.id, build, nodeMap)) return;
                    const next = { ...build, [node.id]: rank - 1 };
                    if (!next[node.id]) delete next[node.id];
                    onUpdate(next);
                }

                return (
                    <div
                        style={{
                            display: "flex",
                            flexDirection: "column",
                            gap: 0,
                        }}
                    >
                        {/* Header */}
                        <div
                            style={{
                                display: "flex",
                                alignItems: "center",
                                gap: 10,
                                padding: "8px 12px 10px",
                                background: `linear-gradient(90deg,${classColor}18,transparent)`,
                                borderBottom: `1px solid ${classColor}22`,
                                marginBottom: 12,
                            }}
                        >
                            {icon && (
                                <img
                                    src={icon}
                                    style={{
                                        width: 26,
                                        height: 26,
                                        borderRadius: 3,
                                        border: `1px solid ${classColor}55`,
                                    }}
                                    alt=""
                                    onError={(e) =>
                                        (e.target.style.display = "none")
                                    }
                                />
                            )}
                            <div>
                                <div
                                    style={{
                                        color: classColor,
                                        fontSize: 13,
                                        fontWeight: 700,
                                        fontFamily: '"Exo 2",sans-serif',
                                    }}
                                >
                                    {title}
                                </div>
                                <div
                                    style={{
                                        color: "#555",
                                        fontSize: 11,
                                        fontFamily: '"Exo 2",sans-serif',
                                    }}
                                >
                                    Потрачено очков: {spent} {label && `· ${label}`}
                                </div>
                            </div>
                        </div>

                        {/* Gates */}
                        {gates.length > 0 && (
                            <div
                                style={{
                                    display: "flex",
                                    gap: 6,
                                    padding: "0 12px 10px",
                                    flexWrap: "wrap",
                                }}
                            >
                                {gates.map((req) => (
                                    <div
                                        key={req}
                                        style={{
                                            fontSize: 10,
                                            fontFamily: '"Exo 2",sans-serif',

            const LOADOUT_CHARS =
                "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
            const LOADOUT_BITS_PER_CHAR = 6;
            const LOADOUT_VERSION_BITS = 8;
            const LOADOUT_SPEC_BITS = 16;
            const LOADOUT_TREE_HASH_BITS = 128;
            const LOADOUT_RANK_BITS = 6;
            const LOADOUT_CHOICE_BITS = 2;

            function createLoadoutReader(exportString) {
                const dataValues = [];
                for (const ch of exportString.trim()) {
                    const value = LOADOUT_CHARS.indexOf(ch);
                    if (value < 0) {
                        throw new Error("Неверный символ в строке талантов");
                    }
                    dataValues.push(value);
                }

                return {
                    dataValues,
                    currentIndex: 0,
                    currentExtractedBits: 0,
                    currentRemainingValue: dataValues[0] || 0,
                    extractValue(bitWidth) {
                        let value = 0;
                        let bitsNeeded = bitWidth;

                        while (bitsNeeded > 0) {
                            if (this.currentIndex >= this.dataValues.length) {
                                throw new Error("Строка талантов обрезана");
                            }

                            const remainingBits =
                                LOADOUT_BITS_PER_CHAR -
                                this.currentExtractedBits;
                            const bitsToTake = Math.min(
                                remainingBits,
                                bitsNeeded,
                            );
                            const bitMask = (1 << bitsToTake) - 1;

                            value |=
                                (this.currentRemainingValue & bitMask) <<
                                (bitWidth - bitsNeeded);

                            this.currentRemainingValue >>= bitsToTake;
                            this.currentExtractedBits += bitsToTake;
                            bitsNeeded -= bitsToTake;

                            if (
                                this.currentExtractedBits ===
                                LOADOUT_BITS_PER_CHAR
                            ) {
                                this.currentIndex += 1;
                                this.currentExtractedBits = 0;
                                this.currentRemainingValue =
                                    this.dataValues[this.currentIndex] || 0;
                            }
                        }

                        return value;
                    },
                    hasRemainingBits() {
                        return this.currentIndex < this.dataValues.length;
                    },
                };
            }

            function readLoadoutHeader(reader) {
                const minBits =
                    LOADOUT_VERSION_BITS +
                    LOADOUT_SPEC_BITS +
                    LOADOUT_TREE_HASH_BITS;
                const totalBits =
                    reader.dataValues.length * LOADOUT_BITS_PER_CHAR;

                if (totalBits < minBits) {
                    return { valid: false, version: 0, specId: 0 };
                }

                const version = reader.extractValue(LOADOUT_VERSION_BITS);
                const specId = reader.extractValue(LOADOUT_SPEC_BITS);

                for (
                    let bitsLeft = LOADOUT_TREE_HASH_BITS;
                    bitsLeft > 0;
                    bitsLeft -= LOADOUT_BITS_PER_CHAR
                ) {
                    reader.extractValue(
                        Math.min(LOADOUT_BITS_PER_CHAR, bitsLeft),
                    );
                }

                return { valid: true, version, specId };
            }

            function decodeNodeStates(exportString) {
                const reader = createLoadoutReader(exportString);
                const header = readLoadoutHeader(reader);

                if (!header.valid) {
                    throw new Error("Неверный формат строки талантов");
                }
                if (header.version !== 1 && header.version !== 2) {
                    throw new Error(
                        `Неизвестная версия формата: ${header.version}`,
                    );
                }

                const states = [];
                while (reader.hasRemainingBits()) {
                    const isNodeSelected = reader.extractValue(1) === 1;
                    let isNodePurchased = isNodeSelected;
                    let isPartiallyRanked = false;
                    let partialRanksPurchased = 0;
                    let isChoiceNode = false;
                    let choiceNodeSelection = 0;

                    if (header.version > 1 && isNodeSelected) {
                        isNodePurchased = reader.extractValue(1) === 1;
                    }
                    if (isNodePurchased) {
                        isPartiallyRanked = reader.extractValue(1) === 1;
                        if (isPartiallyRanked) {
                            partialRanksPurchased = reader.extractValue(
                                LOADOUT_RANK_BITS,
                            );
                        }
                        isChoiceNode = reader.extractValue(1) === 1;
                        if (isChoiceNode) {
                            choiceNodeSelection = reader.extractValue(
                                LOADOUT_CHOICE_BITS,
                            );
                        }
                    }

                    states.push({
                        isNodeSelected,
                        isNodePurchased,
                        isPartiallyRanked,
                        partialRanksPurchased,
                        isChoiceNode,
                        choiceNodeSelection,
                    });
                }

                return {
                    importedSpecId: header.specId,
                    states,
                };
            }

            function getImportNodeOrder(current) {
                const order = [...(current.fullNodeOrder || [])];
                if (current.classId === 6 && current.specId === 250) {
                    const improvedHeartStrike = order.indexOf(76126);
                    const improvedVampiricBlood = order.indexOf(76140);
                    if (
                        improvedHeartStrike >= 0 &&
                        improvedVampiricBlood >= 0
                    ) {
                        order[improvedHeartStrike] = 76140;
                        order[improvedVampiricBlood] = 76126;
                    }
                }
                return order;
            }

            function decodeTalentString(code, current) {
                const { importedSpecId, states } = decodeNodeStates(code);
                const allNodes = [
                    ...(current.classNodes || []),
                    ...(current.specNodes || []),
                    ...(current.heroNodes || []),
                    ...(current.subTreeNodes || []),
                ];
                const allMap = {};
                for (const node of allNodes) {
                    allMap[node.id] = node;
                }

                const fullNodeOrder = getImportNodeOrder(current);
                if (states.length < fullNodeOrder.length) {
                    throw new Error("Строка талантов не соответствует дереву");
                }

                const classSet = new Set(
                    (current.classNodes || []).map((node) => node.id),
                );
                const specSet = new Set(
                    (current.specNodes || []).map((node) => node.id),
                );
                const heroSet = new Set(
                    (current.heroNodes || []).map((node) => node.id),
                );

                const newClass = {};
                const newSpec = {};
                const newHero = {};
                let newSubTreeId = null;

                fullNodeOrder.forEach((nodeId, index) => {
                    const node = allMap[nodeId];
                    const state = states[index];
                    if (!node || !state || !state.isNodePurchased) return;

                    if (node.type === "subtree") {
                        const picked =
                            (node.entries || [])[state.choiceNodeSelection];
                        if (picked) {
                            newSubTreeId = picked.traitSubTreeId;
                        }
                        return;
                    }

                    const build = classSet.has(nodeId)
                        ? newClass
                        : specSet.has(nodeId)
                          ? newSpec
                          : heroSet.has(nodeId)
                            ? newHero
                            : null;
                    if (!build) return;

                    let rank = node.maxRanks || 1;
                    if (state.isPartiallyRanked) {
                        rank = Math.max(1, state.partialRanksPurchased);
                    }
                    build[nodeId] = rank;

                    if (node.type === "choice") {
                        const choiceEntry =
                            (node.entries || [])[state.choiceNodeSelection] ||
                            node.entries?.[0];
                        if (choiceEntry) {
                            build[`${nodeId}_choice`] = choiceEntry.index;
                        }
                    }
                });

                return {
                    importedSpecId,
                    newClass,
                    newSpec,
                    newHero,
                    newSubTreeId,
                };
            }

            function App() {
                const [talentsData, setTalentsData] = useState(
                    window.__TALENTS_DATA__ || null,
                );
                const [classId, setClassId] = useState(6);
                const [specId, setSpecId] = useState(250);
                const [classBuild, setClassBuild] = useState({});
                const [specBuild, setSpecBuild] = useState({});
                const [heroBuild, setHeroBuild] = useState({});
                const [activeSubTreeId, setActiveSubTreeId] = useState(null);
                const [copied, setCopied] = useState(false);
                const [htmlCopied, setHtmlCopied] = useState(false);
                const [importCode, setImportCode] = useState("");
                const [importOpen, setImportOpen] = useState(false);
                const [importError, setImportError] = useState(null);
                const [importOk, setImportOk] = useState(false);

                useEffect(() => {
                    if (!talentsData) {
                        document.addEventListener(
                            "talentsLoaded",
                            () => {
                                setTalentsData(window.__TALENTS_DATA__);
                            },
                            { once: true },

                }, []);

                const current = useMemo(
                    () =>
                        (talentsData || []).find(
                            (d) => d.classId === classId && d.specId === specId,
                        ) ||
                        (talentsData || []).find(
                            (d) => d.classId === classId,
                        ) ||
                        null,
                    [talentsData, classId, specId],
                );

                const classNodeMap = useMemo(
                    () => buildNodeMap(current?.classNodes || []),
                    [current],
                );
                const specNodeMap = useMemo(
                    () => buildNodeMap(current?.specNodes || []),
                    [current],
                );
                const heroNodeMap = useMemo(
                    () => buildNodeMap(current?.heroNodes || []),
                    [current],
                );
                const fullNodeMap = useMemo(
                    () => ({ ...classNodeMap, ...specNodeMap, ...heroNodeMap }),
                    [classNodeMap, specNodeMap, heroNodeMap],
                );

                const classColor = CLASS_COLORS[classId] || "#c8a84b";
                const clsNameRaw = current?.className || "";
                const clsName = classNameRu(classId, clsNameRaw);
                const spcName = specNameRu(specId, current?.specName || "");
                const iconSlug = clsNameRaw.toLowerCase().replace(/\s+/g, "");
                const iconUrl2 = `${CLASS_ICON_BASE}class_${iconSlug}.jpg`;

                const classSpent = totalSpent(classBuild);
                const specSpent = totalSpent(specBuild);

                const resolvedSubTreeId =
                    activeSubTreeId ??
                    current?.subTreeNodes?.[0]?.entries?.[0]?.traitSubTreeId ??
                    null;
                const activeHeroNodes = (current?.heroNodes || []).filter(
                    (n) => n.subTreeId === resolvedSubTreeId,
                );
                const heroSubTreeName = subTreeNameRu(
                    current?.subTreeNodes?.[0]?.entries?.find(
                        (e) => e.traitSubTreeId === resolvedSubTreeId,
                    ),
                    "Герой",
                );

                function handleSelect(cid, sid) {
                    setClassId(cid);
                    setSpecId(sid);
                    setClassBuild({});
                    setSpecBuild({});
                    setHeroBuild({});
                    setActiveSubTreeId(null);
                }
                function handleReset() {
                    setClassBuild({});
                    setSpecBuild({});
                    setHeroBuild({});
                }
                function handleCopy() {
                    const url = window.location.href;
                    navigator.clipboard.writeText(url).then(() => {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    });
                }

                // Генерация статичного HTML для вставки в .md гайды
                function generateStaticHtml() {
                    function nodesBounds(nodes) {
                        let mnX = Infinity,
                            mnY = Infinity,
                            mxX = -Infinity,
                            mxY = -Infinity;
                        for (const n of nodes) {
                            if (n.posX < mnX) mnX = n.posX;
                            if (n.posY < mnY) mnY = n.posY;
                            if (n.posX > mxX) mxX = n.posX;
                            if (n.posY > mxY) mxY = n.posY;
                        }
                        return { mnX, mnY, mxX, mxY };
                    }

                    function renderTreeHtml(
                        nodes,
                        build,
                        nodeMap,
                        title,
                        color,
                        isLast,
                    ) {
                        if (!nodes || !nodes.length) return "";
                        const { mnX, mnY, mxX, mxY } = nodesBounds(nodes);
                        const cols = Math.round((mxX - mnX) / GRID_STEP) + 1;
                        const rows = Math.round((mxY - mnY) / GRID_STEP) + 1;
                        const W = (cols - 1) * GRID_PX + CELL_PX + 8;
                        const H = (rows - 1) * GRID_PX + CELL_PX + 8;
                        const half = CELL_PX / 2;
                        const ARROW_SIZE = 5,
                            ARROW_W = 2.5;

                        // SVG связей
                        let svgLines = "";
                        const seen = new Set();
                        for (const node of nodes) {
                            for (const nextId of node.next || []) {
                                const key = `${node.id}-${nextId}`;
                                if (seen.has(key)) continue;
                                seen.add(key);
                                const target = nodeMap[nextId];
                                if (!target) continue;
                                const fx =
                                    Math.round(
                                        ((node.posX - mnX) / GRID_STEP) *
                                            GRID_PX,
                                    ) + half;
                                const fy =
                                    Math.round(
                                        ((node.posY - mnY) / GRID_STEP) *
                                            GRID_PX,
                                    ) + half;
                                const tx =
                                    Math.round(
                                        ((target.posX - mnX) / GRID_STEP) *
                                            GRID_PX,
                                    ) + half;
                                const ty =
                                    Math.round(
                                        ((target.posY - mnY) / GRID_STEP) *
                                            GRID_PX,
                                    ) + half;
                                const dx = tx - fx,
                                    dy = ty - fy;
                                const dist = Math.sqrt(dx * dx + dy * dy) || 1;
                                const ux = dx / dist,
                                    uy = dy / dist,
                                    nx = -uy,
                                    ny = ux;
                                const x1 = fx + ux * (half + 2),
                                    y1 = fy + uy * (half + 2);
                                const x2 = tx - ux * (half + ARROW_SIZE + 1),
                                    y2 = ty - uy * (half + ARROW_SIZE + 1);
                                const tipX = tx - ux * (half - 1),
                                    tipY = ty - uy * (half - 1);
                                const bx = tipX - ux * ARROW_SIZE,
                                    by = tipY - uy * ARROW_SIZE;
                                const pts = `${tipX},${tipY} ${bx + nx * ARROW_W},${by + ny * ARROW_W} ${bx - nx * ARROW_W},${by - ny * ARROW_W}`;
                                const fromA = getNodeRank(node, build) > 0,
                                    toA = getNodeRank(target, build) > 0;
                                const col = fromA && toA ? "#c9b27a" : "#3a3529";
                                const sw = fromA && toA ? 1.25 : 1;
                                svgLines += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/>`;
                                svgLines += `<polygon points="${pts}" fill="${col}"/>`;
                            }
                        }

                        // Иконки нод
                        let nodesHtml = "";
                        for (const node of nodes) {
                            const x = Math.round(
                                ((node.posX - mnX) / GRID_STEP) * GRID_PX,
                            );
                            const y = Math.round(
                                ((node.posY - mnY) / GRID_STEP) * GRID_PX,
                            );
                            const rank = getNodeRank(node, build);
                            const maxRank = node.maxRanks || 1;
                            const isFull = rank >= maxRank;
                            const isEmpty = rank === 0;
                            const isChoice = node.type === "choice";
                            const choiceIdx = getNodeChoice(node, build);
                            const entry = localizedEntry(
                                isChoice && rank > 0
                                    ? (node.entries || []).find(
                                          (e) => e.index === choiceIdx,
                                      ) || node.entries?.[0]
                                    : node.entries?.[0],
                            );
                            if (!entry) continue;
                            const icon = entry.icon
                                ? `https://wow.zamimg.com/images/wow/icons/large/${entry.icon.replace(/\.(tga|blp)$/i, "")}.jpg`
                                : "https://wow.zamimg.com/images/wow/icons/large/inv_misc_questionmark.jpg";
                            const isPassive = entry.type === "passive";
                            const radius = isChoice
                                ? "20%"
                                : isPassive
                                  ? "50%"
                                  : "3px";
                            const avail = isNodeAvailable(node, build, nodeMap);
                            const filter = isEmpty && !avail
                                ? "grayscale(100%) brightness(0.34)"
                                : isEmpty
                                  ? "brightness(1)"
                                  : "brightness(1) saturate(1)";
                            const border = isFull
                                ? "2px solid #dec57f"
                                : rank > 0 || avail
                                  ? "2px solid #84ad57"
                                  : "2px solid #3b3429";
                            const glow = "";
                            nodesHtml += `<div title="${entry.name}" style="position:absolute;left:${x}px;top:${y}px;width:${CELL_PX}px;height:${CELL_PX}px;">`;
                            nodesHtml += `<img src="${icon}" alt="${entry.name}" style="width:100%;height:100%;display:block;border-radius:${radius};border:${border};${glow}filter:${filter};box-sizing:border-box;"/>`;
                            if (maxRank > 1) {
                                nodesHtml += `<div style="position:absolute;right:-2px;bottom:-2px;font-size:9px;font-weight:700;color:#fff;background:#000;border-radius:2px;padding:0 3px;font-family:'Exo 2',sans-serif;white-space:nowrap;text-shadow:1px 1px 0 #242424,0 1px 0 #242424,-1px 1px 0 #242424,-1px 0 0 #242424,-1px -1px 0 #242424,0 -1px 0 #242424,1px -1px 0 #242424,1px 0 0 #242424;line-height:1;z-index:2;">${rank}/${maxRank}</div>`;
                            }
                            nodesHtml += `</div>`;
                        }

                        return `
<div style="flex:0 0 auto;padding:0 16px 16px;${isLast ? "" : `border-right:1px solid ${color}18;`} ">
  <div style="color:${color};font-size:12px;font-weight:700;font-family:'Exo 2',sans-serif;padding:6px 12px 10px;margin-bottom:10px;background:linear-gradient(90deg,${color}18,transparent);border-bottom:1px solid ${color}22;">${title}</div>
  <div style="position:relative;width:${W}px;height:${H}px;">
    <svg style="position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;">${svgLines}</svg>
    ${nodesHtml}
  </div>
</div>`;
                    }

                    // Собираем полный nodeMap для разрешения связей между деревьями
                    const allNodes = [
                        ...(current.classNodes || []),
                        ...(current.heroNodes || []),
                        ...(current.specNodes || []),
                    ];
                    const allMap = {};
                    for (const n of allNodes) allMap[n.id] = n;

                    const color = CLASS_COLORS[classId] || "#c8a84b";
                    const trees = [];
                    trees.push([
                        current.classNodes || [],
                        classBuild,
                        allMap,
                        clsName,
                    ]);
                    if (activeHeroNodes.length) {
                        trees.push([
                            activeHeroNodes,
                            heroBuild,
                            allMap,
                            heroSubTreeName,
                        ]);
                    }
                    if ((current.specNodes || []).length) {
                        trees.push([
                            current.specNodes || [],
                            specBuild,
                            allMap,
                            spcName,
                        ]);
                    }

                    const html = trees
                        .map(([nodes, build, map, title], index) =>
                            renderTreeHtml(
                                nodes,
                                build,
                                map,
                                title,
                                color,
                                index === trees.length - 1,
                            ),
                        )
                        .join("");

                    const fullHtml = `<div class="tc-static" style="display:inline-block;max-width:100%;overflow-x:auto;background:rgb(38, 38, 38);border:1px solid ${color}22;border-radius:8px;padding:8px 0 16px;margin:16px 0;vertical-align:top;">
  <div style="display:inline-flex;align-items:flex-start;padding:8px 4px 0;">
${html}
  </div>
</div>`;

                    navigator.clipboard.writeText(fullHtml).then(() => {
                        setHtmlCopied(true);
                        setTimeout(() => setHtmlCopied(false), 2500);
                    });
                }

                function handleImport() {
                    setImportError(null);
                    setImportOk(false);
                    if (!importCode.trim()) return;
                    try {
                        const {
                            importedSpecId,
                            newClass,
                            newSpec,
                            newHero,
                            newSubTreeId,
                        } = decodeTalentString(importCode, current);
                        if (importedSpecId !== current.specId) {
                            throw new Error(
                                `Код рассчитан на другой спек (${importedSpecId})`,
                            );
                        }
                        setClassBuild(newClass);
                        setSpecBuild(newSpec);
                        setHeroBuild(newHero);
                        if (newSubTreeId) setActiveSubTreeId(newSubTreeId);
                        setImportOk(true);
                        setImportCode("");
                        setTimeout(() => {
                            setImportOk(false);
                            setImportOpen(false);
                        }, 1500);
                    } catch (e) {
                        setImportError(e.message || "Неверный формат строки");
                    }
                }

                if (!talentsData)
                    return (
                        <div
                            style={{
                                color: "#555",
                                padding: 40,
                                textAlign: "center",
                                fontFamily: "sans-serif",
                            }}
                        >
                            Загрузка талантов…
                        </div>
                    );
                if (!current)
                    return (
                        <div
                            style={{
                                color: "#555",
                                padding: 40,
                                textAlign: "center",
                                fontFamily: "sans-serif",
                            }}
                        >
                            Нет данных для этого класса/специализации.
                        </div>
                    );

                return (
                    <div
                        style={{
                            background:
                                "linear-gradient(180deg,#08080e,#050505)",
                            border: `1px solid ${classColor}22`,
                            borderRadius: 8,
                            overflow: "hidden",
                            boxShadow: `0 0 60px rgba(0,0,0,0.9), 0 0 120px ${classColor}08`,
                        }}
                    >
                        {/* Toolbar */}
                        <div
                            style={{
                                display: "flex",
                                alignItems: "center",
                                justifyContent: "space-between",
                                padding: "10px 16px",
                                borderBottom: `1px solid ${classColor}22`,
                                background: "rgba(0,0,0,0.4)",
                                flexWrap: "wrap",
                                gap: 8,
                            }}
                        >
                            <div
                                style={{
                                    color: classColor,
                                    fontFamily: '"Exo 2",sans-serif',
                                    fontWeight: 700,
                                    fontSize: 16,
                                    letterSpacing: "0.5px",
                                }}
                            >
                                {spcName} {clsName}
                            </div>
                            <div
                                style={{
                                    display: "flex",
                                    gap: 6,
                                    alignItems: "center",
                                    flexWrap: "wrap",
                                }}
                            >
                                <div
                                    style={{
                                        fontFamily: '"Exo 2",sans-serif',
                                        fontSize: 12,
                                        color: "#666",
                                        padding: "3px 10px",
                                        background: "#0a0a0a",
                                        borderRadius: 3,
                                        border: "1px solid #1a1a1a",
                                    }}
                                >
                                    Класс:{" "}
                                    <b style={{ color: classColor }}>
                                        {classSpent}
                                    </b>
                                    &nbsp;&nbsp;Спек:{" "}
                                    <b style={{ color: classColor }}>
                                        {specSpent}
                                    </b>
                                    &nbsp;&nbsp;Герой:{" "}
                                    <b style={{ color: classColor }}>
                                        {totalSpent(heroBuild)}
                                    </b>
                                    &nbsp;&nbsp;Всего:{" "}
                                    <b style={{ color: classColor }}>
                                        {classSpent +
                                            specSpent +
                                            totalSpent(heroBuild)}
                                    </b>
                                </div>
                                <button
                                    onClick={handleCopy}
                                    style={{
                                        padding: "4px 12px",
                                        borderRadius: 3,
                                        border: `1px solid ${classColor}44`,
                                        background: copied
                                            ? `${classColor}22`
                                            : "#0a0a0a",
                                        color: classColor,
                                        fontFamily: '"Exo 2",sans-serif',
                                        fontSize: 11,
                                        cursor: "pointer",
                                        transition: "all 0.2s",
                                    }}
                                >
                                    {copied ? "✓ Скопировано!" : "🔗 Поделиться"}
                                </button>
                                <button
                                    onClick={() => {
                                        setImportOpen((v) => !v);
                                        setImportError(null);
                                        setImportOk(false);
                                    }}
                                    style={{
                                        padding: "4px 12px",
                                        borderRadius: 3,
                                        border: `1px solid ${importOpen ? classColor : "#2a2a2a"}`,
                                        background: importOpen
                                            ? `${classColor}18`
                                            : "#0a0a0a",
                                        color: importOpen ? classColor : "#666",
                                        fontFamily: '"Exo 2",sans-serif',
                                        fontSize: 11,
                                        cursor: "pointer",
                                        transition: "all 0.15s",
                                    }}
                                >
                                    ↓ Импорт
                                </button>
                                <button
                                    onClick={generateStaticHtml}
                                    title="Скопировать статичный HTML для вставки в .md гайд"
                                    style={{
                                        padding: "4px 12px",
                                        borderRadius: 3,
                                        border: `1px solid ${htmlCopied ? "#4a9" : "#2a2a2a"}`,
                                        background: htmlCopied
                                            ? "#1a3a2a"
                                            : "#0a0a0a",
                                        color: htmlCopied ? "#4a9" : "#666",
                                        fontFamily: '"Exo 2",sans-serif',
                                        fontSize: 11,
                                        cursor: "pointer",
                                        transition: "all 0.2s",
                                    }}
                                >
                                    {htmlCopied
                                        ? "✓ HTML скопирован!"
                                        : "</> Скопировать HTML"}
                                </button>
                                <button
                                    onClick={handleReset}
                                    style={{
                                        padding: "4px 12px",
                                        borderRadius: 3,
                                        border: "1px solid #222",
                                        background: "#0a0a0a",
                                        color: "#555",
                                        fontFamily: '"Exo 2",sans-serif',
                                        fontSize: 11,
                                        cursor: "pointer",
                                    }}
                                >
                                    ✕ Сброс
                                </button>
                            </div>
                        </div>

                        {/* Selector */}
                        <div
                            style={{
                                padding: "12px 16px",
                                borderBottom: `1px solid ${classColor}18`,
                                background: "rgba(0,0,0,0.2)",
                            }}
                        >
                            <Selector
                                data={talentsData}
                                classId={classId}
                                specId={specId}
                                onSelect={handleSelect}
                            />
                        </div>

                        {/* Import panel */}
                        {importOpen && (
                            <div
                                style={{
                                    padding: "12px 16px",
                                    borderBottom: `1px solid ${classColor}18`,
                                    background: "#060608",
                                    display: "flex",
                                    flexDirection: "column",
                                    gap: 8,
                                }}
                            >
                                <div
                                    style={{
                                        color: "#888",
                                        fontSize: 11,
                                        fontFamily: '"Exo 2",sans-serif',
                                    }}
                                >
                                    Вставьте строку экспорта талантов из игры —
                                    меню «Таланты» → иконка стрелки → «Экспорт»
                                </div>
                                <div style={{ display: "flex", gap: 8 }}>
                                    <input
                                        type="text"
                                        value={importCode}
                                        onChange={(e) =>
                                            setImportCode(e.target.value)
                                        }
                                        onKeyDown={(e) =>
                                            e.key === "Enter" && handleImport()
                                        }
                                        placeholder="BAQAAAAAAAAAAAAAAAAAAAAAAAAzM..."
                                        style={{
                                            flex: 1,
                                            padding: "5px 10px",
                                            background: "#111",
                                            border: `1px solid ${importError ? "#c44" : "#2a2a2a"}`,
                                            borderRadius: 3,
                                            color: "#ccc",
                                            fontFamily: "Consolas, monospace",
                                            fontSize: 12,
                                            outline: "none",
                                        }}
                                    />
                                    <button
                                        onClick={handleImport}
                                        style={{
                                            padding: "5px 16px",
                                            borderRadius: 3,
                                            border: `1px solid ${importOk ? "#4a9" : classColor}44`,
                                            background: importOk
                                                ? "#1a3a2a"
                                                : `${classColor}18`,
                                            color: importOk
                                                ? "#4a9"
                                                : classColor,
                                            fontFamily: '"Exo 2",sans-serif',
                                            fontSize: 12,
                                            fontWeight: 700,
                                            cursor: "pointer",
                                            transition: "all 0.2s",
                                            whiteSpace: "nowrap",
                                        }}
                                    >
                                        {importOk
                                            ? "✓ Загружено!"
                                            : "Загрузить"}
                                    </button>
                                </div>
                                {importError && (
                                    <div
                                        style={{
                                            color: "#f77",
                                            fontSize: 11,
                                            fontFamily: '"Exo 2",sans-serif',
                                        }}
                                    >
                                        ✘ {importError}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Trees */}
                        <div
                            style={{
                                overflowX: "auto",
                                overflowY: "visible",
                                background: `radial-gradient(ellipse at 50% -10%,${classColor}0a,transparent 65%)`,
                            }}
                        >
                            <div
                                style={{
                                    display: "inline-flex",
                                    alignItems: "flex-start",
                                    padding: "24px 12px 28px",
                                    gap: 0,
                                }}
                            >
                                {/* Class tree */}
                                <div
                                    style={{
                                        flex: "0 0 auto",
                                        padding: "0 20px 16px",
                                        borderRight: `1px solid ${classColor}18`,
                                    }}
                                >
                                    <TalentTree
                                        title={clsName}
                                        icon={iconUrl2}
                                        nodes={current.classNodes || []}
                                        build={classBuild}
                                        onUpdate={setClassBuild}
                                        nodeMap={fullNodeMap}
                                        classColor={classColor}
                                    />
                                </div>
                                {/* Hero tree */}
                                {activeHeroNodes.length > 0 && (
                                    <div
                                        style={{
                                            flex: "0 0 auto",
                                            padding: "0 20px 16px",
                                            borderRight: `1px solid ${classColor}18`,
                                        }}
                                    >
                                        <HeroSelector
                                            entries={
                                                current.subTreeNodes?.[0]
                                                    ?.entries || []
                                            }
                                            activeSubTreeId={resolvedSubTreeId}
                                            onSelect={(id) => {
                                                setActiveSubTreeId(id);
                                                setHeroBuild({});
                                            }}
                                            classColor={classColor}
                                        />
                                        <TalentTree
                                            title={heroSubTreeName}
                                            icon={iconUrl2}
                                            nodes={activeHeroNodes}
                                            build={heroBuild}
                                            onUpdate={setHeroBuild}
                                            nodeMap={fullNodeMap}
                                            classColor={classColor}
                                        />
                                    </div>
                                )}
                                {/* Spec tree */}
                                {(current.specNodes || []).length > 0 && (
                                    <div
                                        style={{
                                            flex: "0 0 auto",
                                            padding: "0 20px 16px",
                                        }}
                                    >
                                        <TalentTree
                                            title={spcName}
                                            icon={iconUrl2}
                                            nodes={current.specNodes || []}
                                            build={specBuild}
                                            onUpdate={setSpecBuild}
                                            nodeMap={fullNodeMap}
                                            classColor={classColor}
                                        />
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Footer */}
                        <div
                            style={{
                                padding: "7px 16px",
                                borderTop: `1px solid ${classColor}0d`,
                                textAlign: "center",
                                color: "#2a2a2a",
                                fontSize: 10,
                                fontFamily: '"Exo 2",sans-serif',
                                letterSpacing: "0.3px",
                            }}
                        >
                            Левый клик — добавить ранг &nbsp;·&nbsp; Правый клик —
                            убрать ранг &nbsp;·&nbsp; Узлы выбора переключаются
                            кликом
                        </div>
                    </div>
                );
            }

            /* ── Mount ── */
            function mountApp() {
                try {
                    if (
                        !window.ReactDOM ||
                        typeof window.ReactDOM.createRoot !== "function"
                    ) {
                        throw new Error("ReactDOM.createRoot недоступен");
                    }
                    const rootElement = document.getElementById("root");
                    if (!rootElement) {
                        throw new Error("Корневой элемент #root не найден");
                    }
                    const root = ReactDOM.createRoot(rootElement);
                    root.render(<App />);
                } catch (err) {
                    if (window.showFatal) {
                        window.showFatal(`Ошибка монтирования: ${err.message}`);
                    }
                    console.error(err);
                }
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", mountApp, {
                    once: true,
                });
            } else {
                mountApp();
            }
        </script>
    </body>
</html>
