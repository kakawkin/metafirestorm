        <script>
            function switchGuideTab(tabGroup, tabId) {
                const buttons = document.querySelectorAll(`[data-tab-group="${tabGroup}"]`);
                const contents = document.querySelectorAll(`[data-tab-content="${tabGroup}"]`);
                buttons.forEach((btn) => btn.classList.remove('active'));
                contents.forEach((content) => content.classList.remove('active'));
                const activeButton = document.querySelector(`[data-tab-group="${tabGroup}"][data-tab-id="${tabId}"]`);
                const activeContent = document.querySelector(`[data-tab-content="${tabGroup}"][data-tab-id="${tabId}"]`);
                if (activeButton) activeButton.classList.add('active');
                if (activeContent) activeContent.classList.add('active');
            }
            document.addEventListener('DOMContentLoaded', function () {
                document.addEventListener('click', function (e) {
                    if (e.target.classList.contains('guide-tab-btn') || e.target.classList.contains('guide-pill-btn')) {
                        setTimeout(() => { if (window.$WowheadPower) window.$WowheadPower.refreshLinks(); }, 100);
                    }
                });
            });
        </script>
