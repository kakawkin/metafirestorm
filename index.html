        <!-- GitHub Pages SPA redirect: только для github.io -->
        <script>
            (function() {
                // На Netlify и других хостингах с SPA поддержкой sessionStorage НЕ нужен
                if (window.location.hostname.indexOf('github.io') === -1) return;
                var redirect = sessionStorage.getItem('gh-spa-redirect');
                if (redirect) {
                    sessionStorage.removeItem('gh-spa-redirect');
                    history.replaceState(null, null, redirect);
                }
            })();
        </script>

        <!-- Guide Tabs Switcher -->
        <script>
            // Функция для переключения табов в гайдах
            function switchGuideTab(tabGroup, tabId) {
                // Находим все кнопки и контент в группе
                const buttons = document.querySelectorAll(
                    `[data-tab-group="${tabGroup}"]`,
                );
                const contents = document.querySelectorAll(
                    `[data-tab-content="${tabGroup}"]`,
                );

                // Убираем active у всех
                buttons.forEach((btn) => btn.classList.remove("active"));
                contents.forEach((content) =>
                    content.classList.remove("active"),
                );

                // Добавляем active к выбранным
                const activeButton = document.querySelector(
                    `[data-tab-group="${tabGroup}"][data-tab-id="${tabId}"]`,
                );
                const activeContent = document.querySelector(
                    `[data-tab-content="${tabGroup}"][data-tab-id="${tabId}"]`,
                );

                if (activeButton) activeButton.classList.add("active");
                if (activeContent) activeContent.classList.add("active");
            }

            // После загрузки Wowhead tooltips, пере-инициализируем их для новых табов
            document.addEventListener("DOMContentLoaded", function () {
                // Слушаем клики на табах для обновления Wowhead tooltips
                document.addEventListener("click", function (e) {
                    if (
                        e.target.classList.contains("guide-tab-btn") ||
                        e.target.classList.contains("guide-pill-btn")
                    ) {
                        setTimeout(() => {
                            if (window.$WowheadPower)
                                window.$WowheadPower.refreshLinks();
                        }, 100);
                    }
                });
            });
        </script>
